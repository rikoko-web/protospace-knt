<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ProtoSpace</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <main class="main">
        <div class="inner">
            
            <div class="card__wrapper">
                
                <div class="card" th:each="prototype : ${prototypes}">
                    
                    <a th:href="@{/prototypes/{id}(id=${prototype.id})}" class="card__img-link">
                        <img th:src="${prototype.imagePath}" th:alt="${prototype.title}" class="card__img" />
                    </a>
                    
                    <div class="card__body">
                        <a th:href="@{/prototypes/{id}(id=${prototype.id})}" class="card__title" th:text="${prototype.title}">
                            プロトタイプ名称
                        </a>
                        
                        <p class="card__catch-copy" th:text="${prototype.catchCopy}">
                            キャッチコピー
                        </p>
                        
                        <a th:href="@{/users/{id}(id=${prototype.user.id})}" class="card__user" th:text="'by ' + ${prototype.user.name}">
                            by 投稿者名
                        </a>
                    </div>

                </div></div></div></main>

</body>
</html>
