<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSC PROTO SPACE</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
</head>
<body>

    <header class="header">
        <div class="inner">
            <a th:href="@{/}" class="header__logo">KSC PROTO SPACE</a>
            <div class="header__nav">
                <a th:href="@{/logout}" class="nav__link">ログアウト</a>
                <a th:href="@{/protos/new}" class="nav__link">New Proto</a>
            </div>
        </div>
    </header>

    <main class="main" style="align-items: flex-start; padding: 40px 0;">
        <div class="inner">
            
            <div class="user-welcome">
                こんにちは、<a href="#" th:text="${username}"></a>さん
            </div>

            <div class="card__wrapper" th:if="${prototypes != null && !prototypes.isEmpty()}">
                
                <div class="prototype-card" th:each="prototype : ${prototypes}">
                    
                    <div class="card__img">
                        <img th:src="${prototype.image != null} ? @{${prototype.image}} : @{/images/logo.png}" alt="プロトタイプ画像">
                    </div>
                    
                    <div class="card__body">
                        <h3 class="card__title">
                            <a th:href="@{/prototypes/{id}(id=${prototype.id})}" th:text="${prototype.title}">プロトタイプの名称</a>
                        </h3>
                        
                        <p class="card__catchphrase" th:text="${prototype.catchCopy}">キャッチコピー</p>
                        
                        <div class="card__user">
                            by <a th:href="@{/users/{id}(id=${prototype.user.id})}" th:text="${prototype.user.name}">投稿者名</a>
                        </div>
                    </div>
                    
                </div></div><div th:if="${prototypes == null || prototypes.isEmpty()}" style="text-align: center; color: #888; padding: 60px 0; font-size: 16px;">
                <p>現在、投稿されたプロトタイプはありません。</p>
            </div>

        </div>
    </main>

    <footer class="footer">
        <p>© 2026 KCS PROTO SPACE Inc. All rights reserved.</p>
    </footer>

</body>
</html>
