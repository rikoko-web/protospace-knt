<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
    <title th:text="${user.name} + 'さんの情報'">KCS PROTO SPACE - マイページ</title>
</head>
<body>

    <header class="header">
        <div class="inner">
            <a th:href="@{/}" class="header__logo">KCS PROTO SPACE</a>
            <div class="header__nav">
                <a th:href="@{/logout}" class="nav__link" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">ログアウト</a>
                <a th:href="@{/protos/new}" class="nav__link">New Proto</a>
                
                <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
            </div>
        </div>
    </header>

    <main class="main" style="align-items: flex-start; padding: 40px 0;">
        <div class="inner">
            
            <h2 class="page-heading" style="text-align: left; margin-bottom: 20px;" th:text="${user.name} + 'さんの情報'">〇〇さんの情報</h2>
            
            <table class="table">
                <tr>
                    <th>名前</th>
                    <td th:text="${user.name}">ユーザー名が入ります</td>
                </tr>
                <tr>
                    <th>プロフィール</th>
                    <td th:text="${user.profile}">プロフィールが入ります</td>
                </tr>
                <tr>
                    <th>所属</th>
                    <td th:text="${user.occupation}">所属が入ります</td>
                </tr>
                <tr>
                    <th>役職</th>
                    <td th:text="${user.position}">役職が入ります</td>
                </tr>
            </table>

            <h2 class="page-heading" style="text-align: left; margin-top: 50px; margin-bottom: 20px;" th:text="${user.name} + 'さんのプロトタイプ'">〇〇さんのプロトタイプ</h2>
            
            <div class="card__wrapper">
                
                <div class="prototype-card" th:each="prototype : ${userPrototypes}">
                    <div class="card__img">
                        <a th:href="@{/protos/{id}(id=${prototype.id})}">
                            <img th:src="${prototype.image != null} ? @{${prototype.image}} : @{/images/logo.png}" alt="プロトタイプ画像" style="display: block; width: 100%; height: auto;">
                        </a>
                    </div>
                    <div class="card__body">
                        <h3 class="card__title">
                            <a th:href="@{/protos/{id}(id=${prototype.id})}" th:text="${prototype.title}">プロトタイプの名称</a>
                        </h3>
                        <p class="card__catchphrase" th:text="${prototype.catchCopy}">キャッチコピー</p>
                        <div class="card__user">
                            by <span th:text="${user.name}"></span>
                        </div>
                    </div>
                    
                </div></div></div>
    </main>

    <footer class="footer">
        <p>© 2026 KCS PROTO SPACE Inc. All rights reserved.</p>
    </footer>

</body>
</html>
