<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
    <title>PROTO SPACE</title>
</head>

<body>

<div class="contents">
  <div class="container">
    <h2>ユーザー新規登録</h2>

    <div th:if="${errorMessages}" th:each="error : ${errorMessages}">
      <div style="color: red; margin-bottom: 10px;" th:text="${error}"></div>
    </div>

    <form th:action="@{/user}" th:method="post" th:object="${userForm}">
      
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" th:field="*{email}" />
      </div>

      <div class="field">
        <label>パスワード（6文字以上）</label>
        <input type="password" th:field="*{password}" />
      </div>

      <div class="field">
        <label>パスワード再入力</label>
        <input type="password" th:field="*{passwordConfirmation}" />
      </div>

      <div class="field">
        <label>ユーザー名</label>
        <input type="text" th:field="*{nickname}" />
      </div>

      <div class="field">
        <label>プロフィール</label>
        <textarea th:field="*{profile}"></textarea>
      </div>

      <div class="field">
        <label>所属</label>
        <textarea th:field="*{affiliation}"></textarea>
      </div>

      <div class="field">
        <label>役職</label>
        <textarea th:field="*{occupation}"></textarea>
      </div>

      <div class="actions">
        <input type="submit" value="新規登録">
      </div>

    </form>
  </div>
</div>

</body>
</html>
