<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KSC PROTO SPACE</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
</head>
<body>

    <header class="header">
        <div class="inner">
            <a href="/" class="header__logo">KCS PROTO SPACE</a>
            
            <div class="header__nav">
                <div class="user-nav" th:if="${session.loginUser != null}">
                    <p>こんにちは、<span th:text="${session.loginUser.name}">ユーザー</span>さん</p>
                    <a href="/logout">ログアウト</a>
                </div>
                
                <div class="guest-nav" th:unless="${session.loginUser != null}">
                    <a th:href="@{/login}" class="nav__link">ログイン</a>
                    <a th:href="@{/signUp}" class="nav__link">新規登録</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="inner">
            <div class="card__wrapper">
                <div class="card" th:each="prototype : ${prototypes}">
                    <a th:href="@{/prototypes/{id}(id=${prototype.id})}">
                        <img th:src="${prototype.image}" class="card__img" alt="プロトタイプ画像">
                    </a>
                    <div class="card__body">
                        <h3 th:text="${prototype.title}">タイトル</h3>
                        <p th:text="${prototype.catchCopy}">キャッチコピー</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 KCS PROTO SPACE Inc. All rights reserved.</p>
    </footer>

</body>
</html>
