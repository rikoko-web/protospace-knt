<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCS PROTO SPACE</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
</head>
<body>

    <header class="header">
        <div class="inner">
            <a th:href="${session.loginUser != null} ? '/users/' + ${session.loginUser.id} : '/'" class="header__logo">KCS PROTO SPACE</a>
            
            <div class="header__nav">
                <div class="user-nav" th:if="${session.loginUser != null}">
                    <a th:href="@{/protos/new}" class="nav__link">New Proto</a>
                    <a th:href="@{/logout}" class="nav__link" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">ログアウト</a>
                    <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"></form>
                </div>
                
                <div class="guest-nav" th:unless="${session.loginUser != null}">
                    <a th:href="@{/login}" class="nav__link">ログイン</a>
                    <a th:href="@{/signUp}" class="nav__link">新規登録</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main" style="align-items: flex-start; padding: 40px 0;">
        <div class="inner">
            
            <div class="user-welcome" th:if="${session.loginUser != null}">
                こんにちは、<a th:href="@{/users/{id}(id=${session.loginUser.id})}" th:text="${session.loginUser.name}">ユーザー名</a>さん
            </div>

            <div class="card__wrapper" th:if="${prototypes != null && !prototypes.isEmpty()}">
                <div class="prototype-card" th:each="prototype : ${prototypes}">
                    
                    <div class="card__img">
                        <a th:href="@{/prototypes/{id}(id=${prototype.id})}">
                            <img th:src="${prototype.image != null} ? @{${prototype.image}} : @{/images/logo.png}" alt="プロトタイプ画像" style="display: block; width: 100%; height: auto;">
                        </a>
                    </div>
                    
                    <div class="card__body">
                        <h3 class="card__title">
                            <a th:href="@{/prototypes/{id}(id=${prototype.id})}" th:text="${prototype.title}">プロトタイプの名称</a>
                        </h3>
                        
                        <p class="card__catchphrase" th:text="${prototype.catchCopy}">キャッチコピー</p>
                        
                        <div class="card__user">
                            by <span th:text="${prototype.user.name}">投稿者名</span>
                        </div>
                    </div>
                    
                </div>
            </div>
            
            <div th:if="${prototypes == null || prototypes.isEmpty()}" style="text-align: center; color: #888; padding: 60px 0; font-size: 16px;">
                <p>現在、投稿されたプロトタイプはありません。</p>
            </div>

        </div>
    </main>

    <footer class="footer">
        <p>© 2026 KCS PROTO SPACE Inc. All rights reserved.</p>
    </footer>

</body>
</html>
